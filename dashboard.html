<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Life | Centro de Comando Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b14;
            --surface: #161826;
            --surface-accent: #1e2132;
            --primary: #4a90e2;
            --primary-glow: rgba(74, 144, 226, 0.3);
            --success: #00c853;
            --success-glow: rgba(0, 200, 83, 0.3);
            --warning: #ffd600;
            --warning-glow: rgba(255, 214, 0, 0.3);
            --danger: #ff1744;
            --text-main: #e1e2e6;
            --text-dim: #9499b3;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar simple */
        .sidebar {
            width: 80px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 40px;
        }
        .logo { width: 40px; height: 40px; background: var(--primary); border-radius: 12px; box-shadow: 0 0 15px var(--primary-glow); }

        /* Main Content */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a5a9c5 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-title p { color: var(--text-dim); margin: 5px 0 0; font-size: 14px; }

        .bot-control {
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #444;
            position: relative;
        }
        .dot-active { background: var(--success) !important; box-shadow: 0 0 10px var(--success); }
        .dot-sim { background: var(--warning) !important; box-shadow: 0 0 10px var(--warning); }
        .dot-off { background: var(--danger) !important; box-shadow: 0 0 10px var(--danger); }

        select.mode-selector {
            background: transparent;
            color: var(--text-main);
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            padding: 5px;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .glass-card {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100px;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        h3 {
            margin: 0 0 25px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Forms */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select.form-input {
            background: var(--surface-accent);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            outline: none;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-action:hover { background: #357abd; transform: translateY(-2px); }

        /* Tables & Lists */
        .scroller {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            padding-right: 5px;
        }
        .scroller::-webkit-scrollbar { width: 5px; }
        .scroller::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--glass);
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }
        .prod-info h4 { margin: 0; font-size: 15px; }
        .prod-info p { margin: 5px 0 0; font-size: 13px; color: var(--text-dim); }
        .edit-btn { background: var(--surface-accent); color: var(--text-main); border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px; cursor: pointer; }

        .interaction-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 3px solid var(--primary);
        }
        .int-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
        .int-msg { margin-bottom: 10px; font-size: 14px; }
        .int-msg small { display: block; color: var(--text-dim); margin-bottom: 4px; font-size: 10px; text-transform: uppercase; }
        .int-reply { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .int-reply small { color: var(--primary); }

        /* Contact List Styles */
        .contact-item {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.02);
        }
        .contact-item:hover { background: var(--surface-accent); border-color: var(--border); }
        .contact-item.active { background: var(--primary-glow); border-color: var(--primary); color: white; }
        .contact-item span { display: block; font-size: 10px; color: var(--text-dim); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h3 { margin: 0; }
        .close-modal { background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; }
        
        textarea.form-input {
            width: 100%;
            background: var(--surface-accent);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }

        @media (max-width: 1000px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"></div>
    </div>
    <main>
        <header>
            <div class="header-title">
                <h1>Best Life Agent Control</h1>
                <p id="real-time-clock">Conectado al núcleo de ventas</p>
            </div>
            <div class="bot-control">
                <div id="status-dot"></div>
                <select id="bot-mode-select" class="mode-selector">
                    <option value="1">MODO ACTIVO</option>
                    <option value="2">SIMULACIÓN</option>
                    <option value="0">APAGADO</option>
                </select>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Inventario -->
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin:0">📦 Gestión de Inventario</h3>
                    <button onclick="openNewProductModal()" class="btn-action" style="width: auto; padding: 8px 16px; font-size: 12px;">+ Nuevo Producto</button>
                </div>
                
                <div class="scroller" id="products-list">
                    <!-- Dinámico -->
                </div>
            </div>

            <!-- Modal de Producto -->
            <div id="product-modal" class="modal-overlay">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 id="modal-title">Gestión de Producto</h3>
                        <button class="close-modal" onclick="closeModal()">&times;</button>
                    </div>
                    <form id="product-form">
                        <input type="hidden" id="prod-id">
                        <div class="input-group" style="margin-bottom: 15px;">
                            <label>Nombre del Producto</label>
                            <input type="text" id="prod-name" placeholder="Ej. Cloud Pet" required>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Precio Unitario</label>
                                <input type="number" id="prod-price1" placeholder="00.00" required>
                            </div>
                            <div class="input-group">
                                <label>Precio Paquete</label>
                                <input type="number" id="prod-price2" placeholder="00.00">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Descripción (Bot info)</label>
                                <textarea id="prod-desc" class="form-input" placeholder="Para qué sirve..."></textarea>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Características (Bot features)</label>
                                <textarea id="prod-features" class="form-input" placeholder="Color, tamaño, bateria..."></textarea>
                            </div>
                            <div class="input-group">
                                <label>Dudas Frecuentes (Bot FAQ)</label>
                                <textarea id="prod-faq" class="form-input" placeholder="¿Sirve para...?"></textarea>
                            </div>
                        </div>
                        <div class="input-group" style="margin-bottom: 15px;">
                            <label>Visibilidad en Catálogo</label>
                            <select id="prod-active" class="form-input">
                                <option value="true">Visible / Activo</option>
                                <option value="false">Oculto / Inactivo</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-action">Guardar Producto</button>
                    </form>
                </div>
            </div>

            <!-- Chat -->
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3 style="margin:0">💬 Centro de Mensajería</h3>
                    <button onclick="clearFilter()" class="edit-btn" style="font-size: 11px;">Ver Todos</button>
                    <input type="hidden" id="tel-filter">
                </div>
                
                <div style="display: grid; grid-template-columns: 200px 1fr; gap: 20px;">
                    <!-- Lista de Números -->
                    <div class="scroller" id="chat-list" style="border-right: 1px solid var(--border); padding-right: 10px;">
                        <p style="font-size: 11px; color: var(--text-dim); text-transform: uppercase;">Chats Recientes</p>
                        <div id="contacts-container"></div>
                    </div>
                    
                    <!-- Terminal de Mensajes -->
                    <div class="scroller" id="interactions-log" style="max-height: 600px;">
                        <div style="text-align: center; padding: 40px; color: var(--text-dim);">
                            Seleccione un chat para ver la conversación...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function updateStatus() {
            try {
                const res = await fetch('/api/bot/status');
                const data = await res.json();
                const dot = document.getElementById('status-dot');
                const select = document.getElementById('bot-mode-select');
                
                select.value = data.mode;
                dot.className = '';
                
                if (data.mode === 1) dot.classList.add('dot-active');
                else if (data.mode === 2) dot.classList.add('dot-sim');
                else dot.classList.add('dot-off');
            } catch (e) {
                console.error("Fallo al actualizar estado:", e);
            }
        }

        document.getElementById('bot-mode-select').onchange = async (e) => {
            const mode = parseInt(e.target.value);
            await fetch('/api/bot/mode', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode })
            });
            updateStatus();
        };

        async function fetchProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const container = document.getElementById('products-list');
            container.innerHTML = '';
            
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div class="prod-info">
                        <h4>${p.name}</h4>
                        <p>$${p.price_1} ${p.price_2 ? `(Pqte: $${p.price_2})` : ''} • ${p.active ? '✅ Activo' : '❌ Inactivo'}</p>
                    </div>
                    <button class="edit-btn" onclick='editProduct(${JSON.stringify(p)})'>Editar</button>
                `;
                container.appendChild(div);
            });
        }

        let selectedTel = "";

        async function fetchInteractions() {
            try {
                const url = selectedTel ? `/api/interactions?tel=${selectedTel}` : '/api/interactions';
                const res = await fetch(url);
                if (!res.ok) throw new Error('Error en el servidor');
                const logs = await res.json();
                
                // Actualizar lista de contactos lateral (solo si no hay filtro activo o es la primera vez)
                updateContactList(logs);

                const container = document.getElementById('interactions-log');
                container.innerHTML = '';
                
                if (logs.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-dim)">
                        ${selectedTel ? 'Sin mensajes con este cliente.' : 'Aún no hay interacciones registradas.'}
                    </div>`;
                    return;
                }

                logs.forEach(log => {
                    const age = new Date(log.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const div = document.createElement('div');
                    div.className = 'interaction-card';
                    div.innerHTML = `
                        <div class="int-header">
                            <span>#${log.cliente_tel.split('@')[0]}</span>
                            <span>${age}</span>
                        </div>
                        <div class="int-msg">
                            <small>Cliente</small>
                            ${log.mensaje}
                        </div>
                        <div class="int-reply">
                            <small>Best Life Agent</small>
                            ${log.respuesta}
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error("Fallo al sincronizar chats:", e);
                const msg = (e.message === 'Failed to fetch' || e.message === 'NetworkError when attempting to fetch resource.')
                    ? '🔌 No se puede conectar al servidor. ¿Está corriendo <b>index.js</b>?'
                    : `⚠️ Error del servidor: ${e.message}`;
                document.getElementById('interactions-log').innerHTML = `<div style="text-align:center; padding:20px; color:var(--danger)">${msg}</div>`;
            }
        }

        function updateContactList(logs) {
            const container = document.getElementById('contacts-container');
            // Obtener números únicos
            const uniqueTels = [...new Set(logs.map(l => l.cliente_tel))];
            
            // Si no hay cambios en la cantidad de contactos, evitamos reconstruir todo el UI (opcional)
            // Para simplicidad en este MVP, reconstruimos logicamente
            uniqueTels.forEach(tel => {
                if (!document.getElementById(`contact-${tel}`)) {
                    const div = document.createElement('div');
                    div.id = `contact-${tel}`;
                    div.className = `contact-item ${selectedTel === tel ? 'active' : ''}`;
                    const display = tel.split('@')[0];
                    div.innerHTML = `Chat ${display} <span>${tel.includes('g.us') ? 'Grupo' : 'Privado'}</span>`;
                    div.onclick = () => selectContact(tel);
                    container.appendChild(div);
                }
            });
        }

        function selectContact(tel) {
            selectedTel = tel;
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`contact-${tel}`);
            if (activeEl) activeEl.classList.add('active');
            fetchInteractions();
        }

        function clearFilter() {
            selectedTel = "";
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            fetchInteractions();
        }

        document.getElementById('product-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('prod-id').value;
            const product = {
                name: document.getElementById('prod-name').value,
                price_1: parseFloat(document.getElementById('prod-price1').value),
                price_2: document.getElementById('prod-price2').value ? parseFloat(document.getElementById('prod-price2').value) : null,
                active: document.getElementById('prod-active').value === 'true',
                description: document.getElementById('prod-desc').value,
                features: document.getElementById('prod-features').value,
                faq_short: document.getElementById('prod-faq').value,
                sku: 'SKU-' + Date.now().toString(36).toUpperCase(),
                seller_id: 'ERIKA'
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/products/${id}` : '/api/products';
            
            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            });
            
            closeModal();
            fetchProducts();
        };

        function openNewProductModal() {
            resetForm();
            document.getElementById('modal-title').innerText = 'Nuevo Producto';
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function editProduct(p) {
            document.getElementById('modal-title').innerText = 'Editar Producto';
            document.getElementById('prod-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-price1').value = p.price_1;
            document.getElementById('prod-price2').value = p.price_2 || '';
            document.getElementById('prod-active').value = p.active.toString();
            document.getElementById('prod-desc').value = p.description || '';
            document.getElementById('prod-features').value = p.features || '';
            document.getElementById('prod-faq').value = p.faq_short || '';
            document.getElementById('product-modal').style.display = 'flex';
        }

        function resetForm() {
            document.getElementById('prod-id').value = '';
            document.getElementById('product-form').reset();
        }

        // Loop de actualización
        updateStatus();
        fetchProducts();
        fetchInteractions();
        setInterval(fetchInteractions, 5000);
        setInterval(() => {
            const now = new Date();
            document.getElementById('real-time-clock').innerText = 'Sistema Activo | ' + now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
